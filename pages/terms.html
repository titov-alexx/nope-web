      const content = locales[currentLocale];

      // Update page
      document.getElementById("pageTitle").textContent = content.title;
      document.getElementById("content").innerHTML = content.content;
      document.getElementById("footer").textContent = content.footer;
      document.documentElement.lang = currentLocale.toLowerCase();
      document.title = content.title + " - NOPE";

      // Update header
      document.querySelector(".privacy-link").textContent = content.navPrivacy;
      document.querySelector(".terms-link").textContent = content.navTerms;
      document.querySelector(".cta-button").textContent = content.cta;

      // Language picker functionality
      const languagePicker = document.getElementById("languagePicker");
      const currentLang = document.getElementById("currentLang");
      const languageOptions = document.querySelectorAll(".language-option");

      // Initialize with saved locale
      currentLang.textContent = currentLocale;
      languageOptions.forEach((opt) => {
        opt.classList.toggle("selected", opt.dataset.lang === currentLocale);
      });

      languagePicker.addEventListener("click", (e) => {
        e.stopPropagation();
        languagePicker.classList.toggle("active");
      });

      languageOptions.forEach((option) => {
        option.addEventListener("click", () => {
          const selectedLang = option.dataset.lang;
          localStorage.setItem("nope-locale", selectedLang);
          location.reload();
        });
      });

      document.addEventListener("click", () => {
        languagePicker.classList.remove("active");
      });
